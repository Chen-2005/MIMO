services:
  mysql:
    image: mysql:8.0
    container_name: mimo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-dev-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mimo_tts}
      MYSQL_USER: ${MYSQL_USER:-mimo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dev-mimo-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mimo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: mimo-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://mimo:dev-mimo-password@mysql:3306/mimo_tts}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: mimo-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://mimo:dev-mimo-password@mysql:3306/mimo_tts}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: mimo-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
